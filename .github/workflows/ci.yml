name: Gameplay integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install server dependencies
        working-directory: server
        run: npm install --no-audit --no-fund
      - name: Run repository tests
        shell: bash
        run: |
          set +e
          npm test > test-output.txt 2>&1
          status=$?
          if [ $status -ne 0 ]; then
            echo "--- final test diagnostics ---"
            tail -n 65 test-output.txt
            exit $status
          fi
          tail -n 25 test-output.txt
