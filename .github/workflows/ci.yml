name: Gameplay integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install server dependencies
        working-directory: server
        run: npm install --no-audit --no-fund
      - name: Run repository tests
        shell: bash
        run: |
          set +e
          npm test > test-output.txt 2>&1
          status=$?
          echo "$status" > test-status.txt
          tail -n 65 test-output.txt
          exit 0
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gameplay-test-diagnostics
          path: |
            test-output.txt
            test-status.txt
          retention-days: 3
      - name: Enforce test result
        shell: bash
        run: |
          status=$(cat test-status.txt)
          if [ "$status" != "0" ]; then
            echo "Gameplay integration tests failed. See the uploaded diagnostics artifact."
            exit "$status"
          fi
