name: Patch profanity boundaries

on:
  push:
    branches:
      - fix-profanity-boundaries-v3
    paths:
      - .github/workflows/patch-profanity-boundaries.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: fix-profanity-boundaries-v3
          fetch-depth: 0

      - name: Replace substring matching with token-aware matching
        shell: python
        run: |
          from pathlib import Path

          server_path = Path("server/server-v3.js")
          source = server_path.read_text(encoding="utf-8")
          old = '''function canonicalText(value) { return sanitizeText(value, "", 80).normalize("NFD").replace(/[\\u0300-\\u036f]/g, "").toLowerCase().replace(/0/g, "o").replace(/[1!|]/g, "i").replace(/3/g, "e").replace(/4|@/g, "a").replace(/5|\\$/g, "s").replace(/7/g, "t").replace(/[^a-z]/g, ""); }
          function containsBannedLanguage(value) { const compact = canonicalText(value); return BANNED_WORDS.some((word) => compact.includes(canonicalText(word))); }'''
          new = '''function normalizedLeetspeak(value) { return sanitizeText(value, "", 80).normalize("NFD").replace(/[\\u0300-\\u036f]/g, "").toLowerCase().replace(/0/g, "o").replace(/[1!|]/g, "i").replace(/3/g, "e").replace(/[4@]/g, "a").replace(/[5$]/g, "s").replace(/7/g, "t"); }
          function canonicalText(value) { return normalizedLeetspeak(value).replace(/[^a-z]/g, ""); }
          function canonicalNameTokens(value) {
            const tokens = normalizedLeetspeak(value).split(/[^a-z]+/g).filter(Boolean);
            const collapsedShortRuns = [];
            let run = "";
            for (const token of tokens) {
              if (token.length <= 2) { run += token; if (run.length > 18) run = token; }
              else { if (run) collapsedShortRuns.push(run); run = ""; }
            }
            if (run) collapsedShortRuns.push(run);
            return [...tokens, ...collapsedShortRuns];
          }
          function containsBannedLanguage(value) {
            const banned = new Set(BANNED_WORDS.map(canonicalText));
            return canonicalNameTokens(value).some((token) => banned.has(token));
          }'''
          if old not in source:
            raise SystemExit("Expected profanity-filter block was not found; refusing an unsafe partial patch.")
          server_path.write_text(source.replace(old, new, 1), encoding="utf-8")

          test_path = Path("scripts/runtime-test.js")
          test_source = test_path.read_text(encoding="utf-8")
          old_tests = '''assert.equal(containsBannedLanguage("Mierda Team"), true);
          assert.equal(containsBannedLanguage("Geometry Masters"), false);
          assert.equal(containsBannedLanguage("Computer Team"), false);'''
          new_tests = '''assert.equal(containsBannedLanguage("Mierda Team"), true);
          assert.equal(containsBannedLanguage("m.i.e.r.d.a"), true);
          assert.equal(containsBannedLanguage("f u c k"), true);
          assert.equal(containsBannedLanguage("Geometry Masters"), false);
          assert.equal(containsBannedLanguage("Computadora Team"), false);
          assert.equal(containsBannedLanguage("Maricarmen"), false);
          assert.equal(containsBannedLanguage("Dickson Geometry"), false);'''
          if old_tests not in test_source:
            raise SystemExit("Expected runtime-test block was not found.")
          test_path.write_text(test_source.replace(old_tests, new_tests, 1), encoding="utf-8")

      - name: Validate corrected filter and game
        run: npm test

      - name: Commit corrected source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/server-v3.js scripts/runtime-test.js
          git commit -m "Fix profanity filter false positives"
          git push origin HEAD:fix-profanity-boundaries-v3
