name: Validate classroom game

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run validation suite
        id: validation
        shell: bash
        run: |
          set +e
          npm test > validation-output.log 2>&1
          status=$?
          cat validation-output.log
          exit $status
      - name: Upload validation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-output
          path: validation-output.log
          retention-days: 7
