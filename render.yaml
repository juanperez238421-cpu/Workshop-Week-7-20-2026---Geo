services:
  - type: web
    name: triad-territory-rush-server
    runtime: node
    plan: free
    region: virginia
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TEACHER_PASSWORD
        sync: false
